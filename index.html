<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Gradient Texture Generator</title>
    <style>
        :root {
            --bg-light: #f4f4f8;
            --bg-white: #ffffff;
            --text-dark: #2c3e50;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --border-light: #e0e4e8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-light);
            line-height: 1.6;
            color: var(--text-dark);
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-card {
            background-color: var(--bg-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 900px;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .preview-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .preview-container {
            width: 500px;
            height: 500px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #checkerboardCanvas, #gradientCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .control-group input, 
        .control-group select {
            padding: 10px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        @media (max-width: 768px) {
            .preview-container {
                width: 100%;
                height: 400px;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Improve color input styling */
        .control-group input[type="color"] {
            width: 100%;
            height: 50px;
            padding: 0;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            appearance: none;
            -webkit-appearance: none;
            background-color: transparent;
            cursor: pointer;
        }

        .control-group input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
            border: none;
        }

        .control-group input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-card">
            <div class="header">
                <h1>Gradient Texture Generator</h1>
            </div>

            <div class="preview-section">
                <div class="preview-container">
                    <canvas id="checkerboardCanvas"></canvas>
                    <canvas id="gradientCanvas"></canvas>
                </div>
            </div>

            <div class="controls-grid">
                <div class="control-group">
                    <label for="gradientType">Gradient Type</label>
                    <select id="gradientType">
                        <option value="linear">Linear</option>
                        <option value="radial">Radial</option>
                        <option value="conic">Conic</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="color1">Color 1</label>
                    <input type="color" id="color1" value="#ff0000">
                    <input type="range" id="alpha1" min="0" max="1" step="0.01" value="1">
                </div>
                <div class="control-group">
                    <label for="color2">Color 2</label>
                    <input type="color" id="color2" value="#0000ff">
                    <input type="range" id="alpha2" min="0" max="1" step="0.01" value="1">
                </div>
                <div class="control-group">
                    <label for="angle">Angle (Linear)</label>
                    <input type="number" id="angle" value="0" min="0" max="360">
                </div>
                <div class="control-group">
                    <label for="width">Width</label>
                    <input type="number" id="width" value="500" min="1" max="2048">
                </div>
                <div class="control-group">
                    <label for="height">Height</label>
                    <input type="number" id="height" value="500" min="1" max="2048">
                </div>
            </div>

            <div class="action-buttons">
                <button id="generateBtn" class="btn btn-primary">Generate Gradient</button>
                <button id="downloadBtn" class="btn btn-primary">Download PNG</button>
            </div>
        </div>
    </div>

    <script>
        const checkerboardCanvas = document.getElementById('checkerboardCanvas');
        const gradientCanvas = document.getElementById('gradientCanvas');
        const ctxCheckerboard = checkerboardCanvas.getContext('2d');
        const ctxGradient = gradientCanvas.getContext('2d');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const gradientType = document.getElementById('gradientType');
        const color1Input = document.getElementById('color1');
        const color2Input = document.getElementById('color2');
        const alpha1Input = document.getElementById('alpha1');
        const alpha2Input = document.getElementById('alpha2');
        const angleInput = document.getElementById('angle');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');

        function updateCanvasSize() {
            const width = parseInt(widthInput.value);
            const height = parseInt(heightInput.value);
            checkerboardCanvas.width = width;
            checkerboardCanvas.height = height;
            gradientCanvas.width = width;
            gradientCanvas.height = height;
        }

        function drawCheckerboard() {
            const tileSize = 10;
            const width = checkerboardCanvas.width;
            const height = checkerboardCanvas.height;

            ctxCheckerboard.fillStyle = '#ffffff';
            ctxCheckerboard.fillRect(0, 0, width, height);

            ctxCheckerboard.fillStyle = '#cccccc';
            for (let x = 0; x < width; x += tileSize) {
                for (let y = 0; y < height; y += tileSize) {
                    if ((x / tileSize + y / tileSize) % 2 === 0) {
                        ctxCheckerboard.fillRect(x, y, tileSize, tileSize);
                    }
                }
            }
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function generateGradient() {
            updateCanvasSize();
            drawCheckerboard();

            const width = gradientCanvas.width;
            const height = gradientCanvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const color1 = hexToRgba(color1Input.value, alpha1Input.value);
            const color2 = hexToRgba(color2Input.value, alpha2Input.value);
            const angle = parseInt(angleInput.value);

            ctxGradient.clearRect(0, 0, width, height);

            let gradient;

            switch (gradientType.value) {
                case 'linear':
                    const radians = (angle * Math.PI) / 180;
                    const x1 = centerX - Math.cos(radians) * centerX;
                    const y1 = centerY - Math.sin(radians) * centerY;
                    const x2 = centerX + Math.cos(radians) * centerX;
                    const y2 = centerY + Math.sin(radians) * centerY;
                    gradient = ctxGradient.createLinearGradient(x1, y1, x2, y2);
                    break;
                case 'radial':
                    gradient = ctxGradient.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(centerX, centerY));
                    break;
                case 'conic':
                    gradient = ctxGradient.createConicGradient(0, centerX, centerY);
                    break;
            }

            gradient.addColorStop(0, color1);
            gradient.addColorStop(1, color2);

            ctxGradient.fillStyle = gradient;
            ctxGradient.fillRect(0, 0, width, height);
        }

        function downloadPNG() {
            const link = document.createElement('a');
            link.download = 'gradient_texture.png';
            link.href = gradientCanvas.toDataURL('image/png');
            link.click();
        }

        generateBtn.addEventListener('click', generateGradient);
        downloadBtn.addEventListener('click', downloadPNG);

        gradientCanvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            downloadPNG();
        });

        // Change default colors to black and white
        color1Input.value = '#000000';
        color2Input.value = '#ffffff';

        // Initial setup with new default colors
        generateGradient();

        // Update gradient on any input change
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('input', generateGradient);
        });
    </script>
</body>
</html>

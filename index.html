<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Gradient Texture Generator</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface2: #f8f9fb;
            --text: #1a202c;
            --text-muted: #718096;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #e2e8f0;
            --danger: #ef4444;
        }
        [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232635;
            --text: #e2e8f0;
            --text-muted: #a0aec0;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --border: #2d3248;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
        }
        .top-bar h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-bar-actions { display: flex; gap: 10px; align-items: center; }
        .icon-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px; height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* Layout */
        .layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            height: calc(100vh - 57px);
            overflow: hidden;
        }

        /* Preview area */
        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: auto;
            background: var(--bg);
        }
        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            max-width: 100%;
            max-height: calc(100vh - 160px);
        }
        #checkerboardCanvas { display: block; }
        #gradientCanvas, #noiseCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .preview-info {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
        }

        /* Side panel */
        .panel {
            background: var(--surface);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .panel::-webkit-scrollbar { width: 4px; }
        .panel::-webkit-scrollbar-track { background: transparent; }
        .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .panel-section {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Presets */
        .presets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .preset-swatch {
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .preset-swatch:hover { transform: scale(1.1); box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
        .preset-swatch.active { border-color: var(--accent); }

        /* Type grid */
        .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .type-btn {
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--surface2);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
            overflow: hidden;
            padding: 0 0 5px;
        }
        .type-btn canvas { width: 100%; height: 32px; display: block; }
        .type-btn.active { border-color: var(--accent); color: var(--accent); }
        .type-btn:hover  { border-color: var(--accent); }

        /* Color stops */
        #colorStopsContainer { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .color-stop-row {
            display: grid;
            grid-template-columns: 40px 1fr 26px;
            gap: 6px;
            align-items: center;
            padding: 7px;
            background: var(--surface2);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .color-swatch-wrap input[type="color"] {
            width: 40px; height: 40px;
            border: none; border-radius: 6px;
            cursor: pointer; padding: 0; background: none;
        }
        .color-swatch-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .color-swatch-wrap input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }
        .stop-controls { display: flex; flex-direction: column; gap: 3px; }
        .stop-controls label {
            font-size: 10px; color: var(--text-muted); font-weight: 500;
            display: flex; justify-content: space-between;
        }
        .stop-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 3px;
            border-radius: 2px; background: var(--border); outline: none;
        }
        .stop-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .remove-stop-btn {
            width: 24px; height: 24px;
            background: none; border: 1px solid var(--border);
            border-radius: 5px; color: var(--text-muted);
            cursor: pointer; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; align-self: center;
        }
        .remove-stop-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .remove-stop-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .add-stop-btn {
            width: 100%; padding: 7px;
            background: var(--surface2); border: 1px dashed var(--border);
            border-radius: 7px; color: var(--text-muted);
            font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500;
        }
        .add-stop-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Form controls */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
        .form-group label {
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            display: flex; justify-content: space-between;
        }
        .form-group input[type="number"],
        .form-group select {
            padding: 6px 8px; border: 1px solid var(--border);
            border-radius: 6px; background: var(--surface2);
            color: var(--text); font-size: 12px; width: 100%;
        }
        .form-group input[type="number"]:focus,
        .form-group select:focus { outline: none; border-color: var(--accent); }
        .form-group input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 3px; border-radius: 2px; background: var(--border);
        }
        .form-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 13px; height: 13px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }

        /* Toggle */
        .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .toggle-row label { font-size: 11px; font-weight: 600; color: var(--text-muted); }
        .toggle {
            width: 36px; height: 20px; background: var(--border);
            border-radius: 10px; border: none; cursor: pointer;
            position: relative; transition: background 0.25s;
        }
        .toggle::after {
            content: ''; position: absolute;
            width: 14px; height: 14px; background: white;
            border-radius: 50%; top: 3px; left: 3px; transition: left 0.25s;
        }
        .toggle.on { background: var(--accent); }
        .toggle.on::after { left: 19px; }

        /* CSS output */
        .css-output {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 7px; padding: 8px;
            font-size: 11px; font-family: 'Courier New', monospace;
            color: var(--text-muted); word-break: break-all;
            max-height: 70px; overflow-y: auto; line-height: 1.5;
        }

        /* Buttons */
        .format-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .format-btn {
            padding: 4px 9px; border-radius: 5px;
            border: 1px solid var(--border); background: var(--surface2);
            color: var(--text-muted); font-size: 11px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .format-btn.active,
        .format-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .action-row { display: flex; gap: 7px; }
        .btn {
            flex: 1; padding: 9px 10px; border: none;
            border-radius: 7px; font-weight: 600; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        /* History */
        .history-strip { display: flex; gap: 5px; flex-wrap: wrap; }
        .history-item {
            width: 34px; height: 34px; border-radius: 5px;
            cursor: pointer; border: 2px solid transparent; transition: transform 0.15s;
        }
        .history-item:hover { transform: scale(1.1); border-color: var(--accent); }

        /* Center dot */
        #centerDot {
            position: absolute; width: 12px; height: 12px;
            background: white; border: 2px solid rgba(0,0,0,0.6);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; display: none;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
        }

        /* Toast */
        .copy-feedback {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: #1a202c; color: white;
            padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 500;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 1000;
        }
        .copy-feedback.show { opacity: 1; }

        /* Responsive */
        @media (max-width: 860px) {
            .layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
            .preview-area { min-height: 50vw; }
            .panel { border-left: none; border-top: 1px solid var(--border); }
            .canvas-wrapper { max-height: 60vw; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>⧁ Gradient Texture Generator</h1>
    <div class="top-bar-actions">
        <button class="icon-btn" id="themeToggle" title="Toggle dark mode">🌙</button>
        <button class="icon-btn" id="randomBtn"   title="Random gradient">🎲</button>
        <button class="icon-btn" id="shareBtn"    title="Copy share link">🔗</button>
    </div>
</div>

<div class="layout">

    <!-- Preview -->
    <div class="preview-area">
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="checkerboardCanvas"></canvas>
            <canvas id="gradientCanvas"></canvas>
            <canvas id="noiseCanvas"></canvas>
            <div id="centerDot"></div>
        </div>
        <div class="preview-info">
            <span>📏 <span id="sizeLabel">800 × 800</span></span>
            <span>🖱 Click canvas to set center</span>
        </div>
    </div>

    <!-- Side panel -->
    <div class="panel">

        <div class="panel-section">
            <div class="section-title">Presets</div>
            <div class="presets-grid" id="presetsGrid"></div>
        </div>

        <div class="panel-section">
            <div class="section-title">Gradient Type</div>
            <div class="type-grid" id="typeGrid"></div>
        </div>

        <div class="panel-section">
            <div class="section-title">Color Stops</div>
            <div id="colorStopsContainer"></div>
            <button class="add-stop-btn" id="addStopBtn">+ Add Color Stop</button>
        </div>

        <div class="panel-section">
            <div class="section-title">Settings</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Width</label>
                    <input type="number" id="widthInput" value="800" min="1" max="4096">
                </div>
                <div class="form-group">
                    <label>Height</label>
                    <input type="number" id="heightInput" value="800" min="1" max="4096">
                </div>
            </div>
            <div class="form-group" id="angleGroup">
                <label>Angle <span id="angleVal">135°</span></label>
                <input type="range" id="angleInput" value="135" min="0" max="360">
            </div>
            <div class="form-group">
                <label>Scale <span id="scaleVal">100%</span></label>
                <input type="range" id="scaleInput" value="100" min="10" max="300">
            </div>
            <div class="toggle-row">
                <label>Repeat gradient</label>
                <button class="toggle" id="repeatToggle"></button>
            </div>
            <div class="toggle-row">
                <label>Noise overlay</label>
                <button class="toggle" id="noiseToggle"></button>
            </div>
            <div class="form-group" id="noiseGroup" style="display:none">
                <label>Noise intensity <span id="noiseVal">20%</span></label>
                <input type="range" id="noiseInput" value="20" min="1" max="100">
            </div>
        </div>

        <div class="panel-section">
            <div class="section-title">
                CSS Code
                <button class="format-btn" id="copyCssBtn">Copy</button>
            </div>
            <div class="css-output" id="cssOutput"></div>
        </div>

        <div class="panel-section">
            <div class="section-title">Export</div>
            <div class="format-row">
                <button class="format-btn active" data-fmt="png">PNG</button>
                <button class="format-btn" data-fmt="jpg">JPG</button>
                <button class="format-btn" data-fmt="webp">WebP</button>
            </div>
            <div class="form-group" id="qualityGroup" style="display:none">
                <label>Quality <span id="qualityVal">90%</span></label>
                <input type="range" id="qualityInput" value="90" min="10" max="100">
            </div>
            <div class="action-row">
                <button class="btn btn-primary" id="downloadBtn">⬇ Download</button>
                <button class="btn btn-outline"  id="copyImgBtn">📋 Copy</button>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-title">Recent</div>
            <div class="history-strip" id="historyStrip"></div>
        </div>

    </div>
</div>

<div class="copy-feedback" id="copyFeedback">Copied!</div>

<script src="app.js"></script>
</body>
</html>
